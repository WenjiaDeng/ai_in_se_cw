<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dishes List</title>
</head>
<body style="font-family: Arial, sans-serif; background:#f6f6f6; margin:0; padding:0;">
  <div style="max-width: 900px; margin: 0 auto; padding: 20px;">
    <h1 style="text-align:center; color:#333; margin: 10px 0 20px 0;">Dishes List</h1>

    <div style="text-align:center; margin-bottom: 20px;">
      <a href="/orders" style="display:inline-block; padding:10px 14px; background:#333; color:#fff; text-decoration:none; border-radius:4px;">
        View Orders
      </a>
    </div>

    {% if foods and foods|length > 0 %}
      {% for food in foods %}
        <div style="background:#fff; border:1px solid #ddd; border-radius:6px; padding:16px; margin-bottom:16px;">
          <div style="display:flex; gap:16px; align-items:flex-start; flex-wrap:wrap;">
            <div style="flex: 0 0 180px;">
              {% if food.pic %}
                <img src="{{ url_for('static', filename=food.pic) }}" alt="{{ food.name }}" style="width:180px; height:auto; border:1px solid #ddd; border-radius:6px;">
              {% else %}
                <div style="width:180px; padding:14px; border:1px dashed #ccc; border-radius:6px; color:#777; background:#fafafa; text-align:center;">
                  No image
                </div>
              {% endif %}
            </div>

            <div style="flex: 1; min-width: 240px;">
              <h2 style="margin:0 0 8px 0; color:#222;">{{ food.name }}</h2>

              <p style="margin:0 0 8px 0; color:#555;">
                <strong>Description:</strong>
                {{ food.description }}
              </p>

              <p style="margin:0 0 8px 0; color:#555;">
                <strong>Price:</strong>
                {{ food.price }}
              </p>

              <p style="margin:0 0 12px 0; color:#555;">
                <strong>Pic:</strong>
                {{ food.pic }}
              </p>

              <form action="/submitfood" method="post" style="margin:0;">
                <button type="submit" name="food" value="{{ food.name }}"
                        style="padding:10px 14px; background:#007bff; color:#fff; border:none; border-radius:4px; cursor:pointer;">
                  Order
                </button>
              </form>
            </div>
          </div>
        </div>
      {% endfor %}
    {% else %}
      <div style="background:#fff; border:1px solid #ddd; border-radius:6px; padding:16px; color:#555; text-align:center;">
        No dishes available.
      </div>
    {% endif %}
  </div>
</body>
</html>
